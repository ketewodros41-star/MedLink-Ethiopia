version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      - POSTGRES_USER=medlink
      - POSTGRES_PASSWORD=medlink
      - POSTGRES_DB=medlink
    volumes:
      - medlink-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass medplum
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=masterKey
      - MEILI_ENV=development
    ports:
      - "7700:7700"
    volumes:
      - medlink-meili-data:/meili_data

  medplum-server:
    image: medplum/medplum-server:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8103:8103"
    environment:
      MEDPLUM_PORT: 8103
      MEDPLUM_BASE_URL: "http://localhost:8103/"
      MEDPLUM_DATABASE_HOST: 'postgres'
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_DBNAME: 'medlink'
      MEDPLUM_DATABASE_USERNAME: 'medlink'
      MEDPLUM_DATABASE_PASSWORD: 'medlink'
      MEDPLUM_REDIS_HOST: 'redis'
      MEDPLUM_REDIS_PORT: 6379
      MEDPLUM_REDIS_PASSWORD: 'medplum'
      MEDPLUM_BINARY_STORAGE: 'file:./binary/'
      MEDPLUM_ALLOWED_ORIGINS: '*'

  medlink-fastapi:
    build:
      context: ./medlink-fastapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - meilisearch
    volumes:
      - ./medlink-fastapi:/app

volumes:
  medlink-postgres-data:
  medlink-meili-data:
